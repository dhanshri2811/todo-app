<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0c0c12;
    --card: #17171f;
    --card-2: #1d1d27;
    --border: #2a2a35;
    --text: #f5f5f7;
    --text-dim: #8f8f9c;
    --purple: #a855f7;
    --pink: #ec4899;
    --gradient: linear-gradient(135deg, var(--purple), var(--pink));
    --red: #e05a5a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 80% -10%, rgba(168,85,247,0.18) 0%, transparent 40%),
      radial-gradient(circle at 0% 30%, rgba(236,72,153,0.10) 0%, transparent 35%),
      var(--bg);
    font-family:'Inter', sans-serif;
    color:var(--text);
    display:flex;
    justify-content:center;
    padding:36px 18px 120px;
  }
  h1,h2,h3{font-family:'Poppins', sans-serif; margin:0;}
  .hidden{display:none !important;}

  /* ---------- Auth screen ---------- */
  .auth-wrap{
    width:100%;
    max-width:380px;
    margin:auto;
  }
  .auth-logo{
    width:56px; height:56px;
    border-radius:16px;
    background:var(--gradient);
    display:flex; align-items:center; justify-content:center;
    font-size:26px;
    margin:0 auto 18px;
  }
  .auth-wrap h1{
    font-size:24px;
    text-align:center;
    margin-bottom:6px;
  }
  .auth-sub{
    text-align:center;
    color:var(--text-dim);
    font-size:13.5px;
    margin-bottom:26px;
  }
  .field-label{
    font-size:12.5px;
    color:var(--text-dim);
    margin-bottom:6px;
    display:block;
  }
  .auth-wrap input{
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px 16px;
    color:var(--text);
    font-family:'Inter', sans-serif;
    font-size:14px;
    outline:none;
    margin-bottom:16px;
    transition:border-color .15s ease;
  }
  .auth-wrap input:focus{border-color:var(--purple);}
  .auth-error{
    color:var(--red);
    font-size:12.5px;
    margin:-8px 0 14px;
    min-height:16px;
  }
  .btn{
    width:100%;
    border:none;
    border-radius:14px;
    padding:14px;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
  }
  .btn-primary{background:var(--gradient); color:#fff;}
  .btn-secondary{background:var(--card-2); color:var(--text-dim); border:1px solid var(--border);}
  .auth-switch{
    text-align:center;
    font-size:13px;
    color:var(--text-dim);
    margin-top:18px;
  }
  .auth-switch a{color:var(--purple); text-decoration:none; font-weight:600; cursor:pointer;}

  /* ---------- App screen ---------- */
  .app{
    width:100%;
    max-width:480px;
  }
  .header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:22px;
  }
  .header h1{
    font-size:22px;
    font-weight:600;
    line-height:1.3;
  }
  .header .accent{
    background:var(--gradient);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .header-right{display:flex; align-items:center; gap:10px;}
  .avatar{
    width:44px; height:44px;
    border-radius:50%;
    background:var(--gradient);
    display:flex; align-items:center; justify-content:center;
    font-weight:600; font-size:16px;
    flex-shrink:0;
    text-transform:uppercase;
  }
  .logout-btn{
    background:none;
    border:1px solid var(--border);
    color:var(--text-dim);
    border-radius:10px;
    padding:6px 10px;
    font-size:11.5px;
    cursor:pointer;
  }
  .logout-btn:hover{border-color:var(--red); color:var(--red);}

  .search-wrap{position:relative; margin-bottom:22px;}
  .search-wrap svg{position:absolute; left:16px; top:50%; transform:translateY(-50%); opacity:0.5;}
  .search-wrap input{
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px 16px 14px 46px;
    color:var(--text);
    font-family:'Inter', sans-serif;
    font-size:14px;
    outline:none;
  }
  .search-wrap input:focus{border-color:var(--purple);}
  .search-wrap input::placeholder{color:var(--text-dim);}

  .progress-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:20px;
    margin-bottom:26px;
  }
  .progress-card .top-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;}
  .progress-card .top-row h3{font-size:15px; font-weight:600;}
  .progress-card .top-row .pct{
    font-size:15px; font-weight:700;
    background:var(--gradient);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .progress-card .sub{font-size:12.5px; color:var(--text-dim); margin-bottom:14px;}
  .bar-track{width:100%; height:9px; background:var(--card-2); border-radius:6px; overflow:hidden;}
  .bar-fill{height:100%; background:var(--gradient); border-radius:6px; transition:width .35s ease; width:0%;}

  .section-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
  .section-head h3{font-size:16px; font-weight:600;}
  .clear-link{background:none; border:none; color:var(--pink); font-size:12.5px; font-weight:500; cursor:pointer; padding:0;}
  .clear-link:hover{text-decoration:underline;}

  .task-list{display:flex; flex-direction:column; gap:12px; margin-bottom:8px;}
  .task-card{
    background:var(--card);
    border:1px solid var(--border);
    border-left:4px solid var(--accent, var(--purple));
    border-radius:14px;
    padding:16px 14px;
    display:flex; align-items:center; gap:12px;
    animation:fadeIn .25s ease;
  }
  .task-info{flex:1; min-width:0;}
  .task-info .title{font-size:14.5px; font-weight:500; margin-bottom:4px; word-break:break-word;}
  .task-info .title.done{color:var(--text-dim); text-decoration:line-through;}
  .task-meta{font-size:12px; color:var(--text-dim);}
  .check-btn{
    width:30px; height:30px; border-radius:50%;
    border:2px solid var(--border);
    background:transparent;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0;
    transition:all .15s ease;
  }
  .check-btn:hover{border-color:var(--purple);}
  .check-btn.done{background:var(--gradient); border-color:transparent;}
  .check-btn svg{display:none; width:14px; height:14px;}
  .check-btn.done svg{display:block;}
  .del-btn{background:none; border:none; color:var(--text-dim); cursor:pointer; padding:4px; display:flex; flex-shrink:0; transition:color .15s ease;}
  .del-btn:hover{color:var(--pink);}

  .empty-state{
    text-align:center; padding:50px 16px; color:var(--text-dim);
    background:var(--card); border:1px dashed var(--border); border-radius:16px; font-size:13.5px;
  }
  .empty-state .big{font-size:32px; margin-bottom:10px;}

  .fab{
    position:fixed; bottom:32px; right:50%; transform:translateX(224px);
    width:58px; height:58px; border-radius:50%;
    background:var(--gradient); border:none; color:#fff; font-size:28px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 10px 30px rgba(168,85,247,0.45);
    transition:transform .15s ease;
  }
  .fab:hover{transform:translateX(224px) scale(1.06);}
  .fab:active{transform:translateX(224px) scale(0.96);}

  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); backdrop-filter:blur(3px);
    display:none; align-items:flex-end; justify-content:center; z-index:50;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--card); border:1px solid var(--border);
    border-radius:24px 24px 0 0; width:100%; max-width:480px;
    padding:26px 22px 30px; animation:slideUp .25s ease;
  }
  .modal h3{font-size:18px; margin-bottom:18px;}
  .modal input[type="text"]{
    width:100%; background:var(--card-2); border:1px solid var(--border);
    border-radius:14px; padding:14px 16px; color:var(--text);
    font-family:'Inter', sans-serif; font-size:14px; outline:none; margin-bottom:18px;
  }
  .modal input[type="text"]:focus{border-color:var(--purple);}
  .modal-actions{display:flex; gap:10px;}
  .modal-actions .btn{flex:1;}

  @keyframes fadeIn{from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:translateY(0);}}
  @keyframes slideUp{from{opacity:0; transform:translateY(24px);} to{opacity:1; transform:translateY(0);}}

  @media (prefers-reduced-motion: reduce){
    .task-card, .modal, .fab{animation:none !important; transition:none !important;}
  }
  @media (max-width:520px){
    .fab{right:24px; transform:none;}
    .fab:hover, .fab:active{transform:scale(1.06);}
  }
</style>
</head>
<body>

<!-- ===== Auth screen ===== -->
<div class="auth-wrap" id="authScreen">
  <div class="auth-logo">✓</div>
  <h1 id="authTitle">Welcome back</h1>
  <div class="auth-sub" id="authSub">Log in to see your tasks</div>

  <label class="field-label">Username</label>
  <input type="text" id="authUsername" autocomplete="username" placeholder="e.g. dhanshri">

  <label class="field-label">Password</label>
  <input type="password" id="authPassword" autocomplete="current-password" placeholder="••••••••">

  <div class="auth-error" id="authError"></div>

  <button class="btn btn-primary" id="authSubmitBtn">Log in</button>

  <div class="auth-switch">
    <span id="authSwitchText">Don't have an account?</span>
    <a id="authSwitchLink">Sign up</a>
  </div>
</div>

<!-- ===== Main app screen ===== -->
<div class="app hidden" id="appScreen">
  <div class="header">
    <h1>You have got <span class="accent" id="taskCount">0</span> tasks<br>to stay on top of</h1>
    <div class="header-right">
      <div class="avatar" id="avatarInitial">?</div>
    </div>
  </div>
  <button class="logout-btn" id="logoutBtn" style="margin-bottom:18px;">Log out</button>

  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchBox" placeholder="Search your tasks">
  </div>

  <div class="progress-card">
    <div class="top-row">
      <h3>Daily Progress</h3>
      <span class="pct" id="pctLabel">0%</span>
    </div>
    <div class="sub" id="progressSub">Add a task to get started</div>
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
  </div>

  <div class="section-head">
    <h3>Your Tasks</h3>
    <button class="clear-link" id="clearAllBtn">Clear all</button>
  </div>

  <div class="task-list" id="taskList"></div>
</div>

<button class="fab hidden" id="openModalBtn" aria-label="Add task">+</button>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>New task</h3>
    <form id="entryForm">
      <input type="text" id="taskInput" placeholder="What do you need to do?" autocomplete="off">
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary">Add task</button>
      </div>
    </form>
  </div>
</div>

<script>
const API = "/api";
const ACCENTS = ["#a855f7", "#5b8def", "#ec4899", "#f4a259", "#4cd28a"];

// ---------- Elements ----------
const authScreen = document.getElementById("authScreen");
const appScreen = document.getElementById("appScreen");
const authTitle = document.getElementById("authTitle");
const authSub = document.getElementById("authSub");
const authUsername = document.getElementById("authUsername");
const authPassword = document.getElementById("authPassword");
const authError = document.getElementById("authError");
const authSubmitBtn = document.getElementById("authSubmitBtn");
const authSwitchText = document.getElementById("authSwitchText");
const authSwitchLink = document.getElementById("authSwitchLink");
const logoutBtn = document.getElementById("logoutBtn");
const avatarInitial = document.getElementById("avatarInitial");

const taskList = document.getElementById("taskList");
const taskCount = document.getElementById("taskCount");
const pctLabel = document.getElementById("pctLabel");
const progressSub = document.getElementById("progressSub");
const barFill = document.getElementById("barFill");
const overlay = document.getElementById("overlay");
const openModalBtn = document.getElementById("openModalBtn");
const cancelBtn = document.getElementById("cancelBtn");
const entryForm = document.getElementById("entryForm");
const taskInput = document.getElementById("taskInput");
const searchBox = document.getElementById("searchBox");
const clearAllBtn = document.getElementById("clearAllBtn");

let mode = "login"; // or "signup"
let allTasks = [];

// ---------- Auth mode switching ----------
authSwitchLink.addEventListener("click", () => {
  mode = mode === "login" ? "signup" : "login";
  authError.textContent = "";
  if(mode === "signup"){
    authTitle.textContent = "Create account";
    authSub.textContent = "Sign up to start tracking tasks";
    authSubmitBtn.textContent = "Sign up";
    authSwitchText.textContent = "Already have an account?";
    authSwitchLink.textContent = "Log in";
  } else {
    authTitle.textContent = "Welcome back";
    authSub.textContent = "Log in to see your tasks";
    authSubmitBtn.textContent = "Log in";
    authSwitchText.textContent = "Don't have an account?";
    authSwitchLink.textContent = "Sign up";
  }
});

authSubmitBtn.addEventListener("click", async () => {
  const username = authUsername.value.trim();
  const password = authPassword.value;
  authError.textContent = "";
  if(!username || !password){
    authError.textContent = "Please fill in both fields.";
    return;
  }
  const endpoint = mode === "login" ? "/auth/login" : "/auth/signup";
  try{
    const res = await fetch(API + endpoint, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if(!res.ok){
      authError.textContent = data.detail || "Something went wrong.";
      return;
    }
    localStorage.setItem("todo_token", data.token);
    localStorage.setItem("todo_username", data.username);
    enterApp(data.username);
  } catch(err){
    authError.textContent = "Could not reach the server.";
  }
});

logoutBtn.addEventListener("click", () => {
  localStorage.removeItem("todo_token");
  localStorage.removeItem("todo_username");
  appScreen.classList.add("hidden");
  openModalBtn.classList.add("hidden");
  authScreen.classList.remove("hidden");
  authUsername.value = "";
  authPassword.value = "";
});

function authHeaders(){
  return {"Authorization": "Bearer " + localStorage.getItem("todo_token")};
}

function enterApp(username){
  authScreen.classList.add("hidden");
  appScreen.classList.remove("hidden");
  openModalBtn.classList.remove("hidden");
  avatarInitial.textContent = username.charAt(0);
  fetchTasks();
}

// Auto login if a token is already stored
(function tryAutoLogin(){
  const token = localStorage.getItem("todo_token");
  const username = localStorage.getItem("todo_username");
  if(token && username){
    enterApp(username);
  }
})();

// ---------- Task logic ----------
async function apiFetch(path, options = {}){
  const res = await fetch(API + path, {
    ...options,
    headers: {...(options.headers || {}), ...authHeaders()}
  });
  if(res.status === 401){
    logoutBtn.click();
    throw new Error("Session expired");
  }
  return res;
}

async function fetchTasks(){
  const res = await apiFetch("/tasks");
  allTasks = await res.json();
  render(allTasks);
  updateProgress();
}

async function updateProgress(){
  const res = await apiFetch("/tasks/stats");
  const stats = await res.json();
  taskCount.textContent = stats.pending;
  const pct = stats.total ? Math.round((stats.completed / stats.total) * 100) : 0;
  pctLabel.textContent = pct + "%";
  barFill.style.width = pct + "%";
  progressSub.textContent = stats.total
    ? `${stats.completed} of ${stats.total} tasks completed`
    : "Add a task to get started";
}

function render(list){
  taskList.innerHTML = "";
  if(list.length === 0){
    taskList.innerHTML = `
      <div class="empty-state">
        <div class="big">🌤️</div>
        Nothing here yet. Tap the + button to add your first task.
      </div>`;
    return;
  }
  list.forEach((t, i) => {
    const card = document.createElement("div");
    card.className = "task-card";
    card.style.setProperty("--accent", ACCENTS[i % ACCENTS.length]);
    card.innerHTML = `
      <div class="task-info">
        <div class="title ${t.completed ? "done" : ""}">${escapeHtml(t.text)}</div>
        <div class="task-meta">${t.completed ? "Completed" : "In progress"}</div>
      </div>
      <button class="check-btn ${t.completed ? "done" : ""}" data-id="${t.id}" aria-label="Toggle complete">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <button class="del-btn" data-id="${t.id}" aria-label="Delete task">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      </button>
    `;
    taskList.appendChild(card);
  });
}

function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function openModal(){
  overlay.classList.add("open");
  taskInput.value = "";
  setTimeout(() => taskInput.focus(), 50);
}
function closeModal(){ overlay.classList.remove("open"); }

openModalBtn.addEventListener("click", openModal);
cancelBtn.addEventListener("click", closeModal);
overlay.addEventListener("click", (e) => { if(e.target === overlay) closeModal(); });

entryForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = taskInput.value.trim();
  if(!text) return;
  await apiFetch("/tasks", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({text})
  });
  closeModal();
  fetchTasks();
});

taskList.addEventListener("click", async (e) => {
  const check = e.target.closest(".check-btn");
  const del = e.target.closest(".del-btn");
  if(check){
    await apiFetch(`/tasks/${check.dataset.id}/toggle`, {method:"PATCH"});
    fetchTasks();
  } else if(del){
    await apiFetch(`/tasks/${del.dataset.id}`, {method:"DELETE"});
    fetchTasks();
  }
});

clearAllBtn.addEventListener("click", async () => {
  if(allTasks.length === 0) return;
  if(!confirm("Clear every task? This cannot be undone.")) return;
  await apiFetch("/tasks", {method:"DELETE"});
  fetchTasks();
});

searchBox.addEventListener("input", () => {
  const q = searchBox.value.trim().toLowerCase();
  render(q ? allTasks.filter(t => t.text.toLowerCase().includes(q)) : allTasks);
});
</script>

</body>
</html>
